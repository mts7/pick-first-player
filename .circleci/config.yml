version: 2.1

orbs:
  android: circleci/android@2.5.0
  gradle: circleci/gradle@3.0

executors:
  android:
    docker:
      - image: cimg/android:2026.03.1

jobs:
  verify:
    executor: android
    steps:
      - checkout
      - gradle/with_cache:
          steps:
            - run:
                name: Lint and unit tests
                command: ./gradlew lint test --stacktrace

  ui-tests:
    executor:
      name: android/android-machine
      tag: 2026.05.1
    steps:
      - checkout
      - gradle/with_cache:
          steps:
            - run:
                name: Instrumented tests (Gradle Managed Device, ATD image)
                command: ./gradlew pixel6Api34DebugAndroidTest --stacktrace

  build:
    executor: android
    steps:
      - checkout
      - gradle/with_cache:
          steps:
            - run:
                name: Build debug APK
                command: ./gradlew assembleDebug --stacktrace
      - store_artifacts:
          path: app/build/outputs/apk/debug/app-debug.apk

workflows:
  test-build:
    jobs:
      - verify
      - ui-tests:
          requires:
            - verify
      - build:
          requires:
            - ui-tests
