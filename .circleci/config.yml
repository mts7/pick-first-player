version: 2.1

orbs:
  android: circleci/android@2.5.0
  gradle: circleci/gradle@3.0

executors:
  android:
    docker:
      - image: cimg/android:2026.03.1

jobs:
  verify:
    executor: android
    steps:
      - checkout
      - restore_cache:
          keys:
            - android-sdk-docker-v1-{{ checksum "app/build.gradle" }}
      - gradle/with_cache:
          steps:
            - run:
                name: Lint and unit tests
                command: ./gradlew lint test --stacktrace
      - save_cache:
          key: android-sdk-docker-v1-{{ checksum "app/build.gradle" }}
          paths:
            - /home/circleci/android-sdk/platforms/android-37.0

  ui-tests:
    executor:
      name: android/android-machine
      tag: 2026.05.1
    steps:
      - checkout
      - restore_cache:
          keys:
            - android-sdk-machine-v1-{{ checksum "app/build.gradle" }}
      - gradle/with_cache:
          steps:
            - run:
                name: Instrumented tests (Gradle Managed Device, ATD image)
                command: ./gradlew pixel6Api34DebugAndroidTest -Pandroid.testoptions.manageddevices.emulator.gpu=swiftshader_indirect --stacktrace
      - save_cache:
          key: android-sdk-machine-v1-{{ checksum "app/build.gradle" }}
          paths:
            - /opt/android/sdk/platforms/android-37.0
            - /opt/android/sdk/system-images/android-34/google_atd

  build:
    executor: android
    steps:
      - checkout
      - restore_cache:
          keys:
            - android-sdk-docker-v1-{{ checksum "app/build.gradle" }}
      - gradle/with_cache:
          steps:
            - run:
                name: Build debug APK
                command: ./gradlew assembleDebug --stacktrace
      - store_artifacts:
          path: app/build/outputs/apk/debug/app-debug.apk

workflows:
  test-build:
    jobs:
      - verify
      - ui-tests:
          requires:
            - verify
      - build:
          requires:
            - ui-tests
